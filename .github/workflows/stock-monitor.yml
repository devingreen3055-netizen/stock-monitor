name: 股票监控系统

on:
  schedule:
    # 交易时间每5分钟运行一次
    - cron: '*/5 1-3,5-7 * * 1-5'  # 周一至周五交易时间
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - test
          - force-test

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: pip install requests
    
    - name: 运行股票监控
      if: inputs.mode == 'normal' || github.event.inputs.mode == 'normal'
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python stock_monitor.py
    
    - name: 运行功能测试
      if: inputs.mode == 'test' || github.event.inputs.mode == 'test'
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python stock_monitor_test.py
    
    - name: 运行强制测试
      if: inputs.mode == 'force-test' || github.event.inputs.mode == 'force-test'
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        echo "🔧 强制测试模式 - 修改配置以触发消息..."
        # 临时修改阈值
        sed -i 's/2.5: "📈 小幅上涨提醒"/0.1: "🔧 测试提醒"/g' stocks_config.py
        sed -i 's/5.0: "🚀 中度上涨提醒"/0.2: "🔧 测试提醒"/g' stocks_config.py
        python stock_monitor.py
