name: 股票监控

on:
  schedule:
    # 每周一至周五，北京时间9:30-15:00，每5分钟检查一次
    - cron: '*/5 1-3,5-7 * * 1-5'  # UTC时间，对应北京时间9:30-11:30, 13:00-15:00
  
  # 允许手动点击运行（测试用）
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 下载代码
    - uses: actions/checkout@v4
    
    # 2. 安装Python
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    # 3. 升级pip并安装依赖
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install akshare requests pandas
        # 如果需要指定版本，可以添加版本号：
        # pip install akshare==1.12.75 requests==2.31.0 pandas==2.1.4
    
    # 4. 运行监控脚本
    - name: 运行监控
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}  # 这里用GitHub Secrets保护你的Webhook
      run: python stock_monitor.py
