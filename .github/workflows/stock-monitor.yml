name: 股票监控系统

on:
  schedule:
    # 交易时间每5分钟运行一次
    # UTC时间，对应北京时间9:30-11:30, 13:00-15:00
    - cron: '*/5 1-3,5-7 * * 1-5'  # 周一至周五
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式'
        required: false
        default: false
        type: boolean

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: pip install requests
    
    - name: 运行股票监控
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python stock_monitor.py
