name: 股票监控

on:
  schedule:
    # 每周一至周五，北京时间9:30-15:00，每5分钟检查一次
    - cron: '*/5 1-3,5-7 * * 1-5'  # UTC时间，对应北京时间9:30-11:30, 13:00-15:00
  
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: pip install requests
    
    - name: 运行监控
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python stock_monitor.py
