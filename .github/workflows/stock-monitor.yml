name: 股票监控

on:
  schedule:
    # 临时测试：UTC时间 10:01 运行一次（对应北京时间 18:01）
    - cron: '12 10 * * *'  # 分 时 日 月 周 → 10:01 运行一次
  
  # 允许手动点击运行（测试用）
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 下载代码
    - uses: actions/checkout@v4
    
    # 2. 安装Python
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    # 3. 安装依赖
    - name: 安装依赖
      run: pip install akshare requests pandas
    
    # 4. 运行监控脚本
    - name: 运行监控
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python stock_monitor.py
